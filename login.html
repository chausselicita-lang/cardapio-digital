<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Painel Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #E8420A;
      --primary-dark: #C13508;
      --dark: #1A0F00;
      --surface: #FFFFFF;
      --surface2: #FFF8F3;
      --border: #F0E8DF;
      --text: #1A0F00;
      --text2: #5A4A3A;
      --text3: #9A8A7A;
      --font: 'Poppins', sans-serif;
    }
    html { font-size: 16px; }
    body {
      font-family: var(--font);
      background:
        linear-gradient(160deg, rgba(26,15,0,0.92) 0%, rgba(232,66,10,0.65) 55%, rgba(26,15,0,0.95) 100%),
        url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 44px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }
    @media (max-width: 480px) { .login-card { padding: 32px 24px; } }

    .login-logo { font-size: 48px; margin-bottom: 12px; }
    .login-card h1 { font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
    .login-card > p { font-size: 13px; color: var(--text3); margin-bottom: 32px; }

    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }

    .senha-wrap { position: relative; }
    .senha-wrap input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 13px 44px 13px 14px;
      font-size: 15px;
      font-family: var(--font);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 2px;
    }
    .senha-wrap input::placeholder { letter-spacing: 0; }
    .senha-wrap input:focus { border-color: var(--primary); }
    .btn-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--text3);
      padding: 4px;
    }

    .btn-entrar {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 14px rgba(232,66,10,0.3);
    }
    .btn-entrar:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-entrar:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

    .spinner {
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .loading .spinner { display: block; }
    .loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .erro-msg {
      background: rgba(231,76,60,0.08);
      border: 1.5px solid rgba(231,76,60,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #e74c3c;
      font-weight: 600;
      margin-top: 12px;
      display: none;
    }

    .divider { margin: 24px 0; border: none; border-top: 1px solid var(--border); }

    .links-bottom { font-size: 13px; color: var(--text3); }
    .links-bottom a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .links-bottom a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">🍽️</div>
    <h1>Painel Admin</h1>
    <p>Digite sua senha para acessar o painel</p>

    <div class="form-group">
      <label>Senha</label>
      <div class="senha-wrap">
        <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" />
        <button type="button" class="btn-toggle" id="btnToggle">👁️</button>
      </div>
    </div>

    <button class="btn-entrar" id="btnEntrar">
      <div class="spinner"></div>
      <span class="btn-text">🔐 Entrar</span>
    </button>

    <div class="erro-msg" id="erroMsg">Senha incorreta. Tente novamente.</div>

    <hr class="divider" />

    <p class="links-bottom">
      Não tem cadastro? <a href="cadastro.html">Criar meu cardápio</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const rid = new URLSearchParams(location.search).get('rid');

    // Toggle senha
    const senhaInput = document.getElementById('senha');
    document.getElementById('btnToggle').addEventListener('click', () => {
      senhaInput.type = senhaInput.type === 'password' ? 'text' : 'password';
    });

    senhaInput.addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
    document.getElementById('btnEntrar').addEventListener('click', entrar);

    async function entrar() {
      const senha = senhaInput.value;
      const erro  = document.getElementById('erroMsg');
      const btn   = document.getElementById('btnEntrar');

      erro.style.display = 'none';

      if (!senha) {
        erro.textContent = 'Digite sua senha.';
        erro.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.classList.add('loading');

      try {
        let query = db.from('restaurantes').select('id, nome_restaurante, senha_admin');

        // Se tiver ?rid= na URL, valida só contra aquele restaurante
        if (rid) {
          query = query.eq('id', rid).single();
        } else {
          query = query.eq('senha_admin', senha).limit(1).single();
        }

        const { data, error } = await query;

        if (error || !data) throw new Error('não encontrado');
        if (rid && data.senha_admin !== senha) throw new Error('senha incorreta');

        // Login OK — salva sessão e vai direto para o admin
        sessionStorage.setItem('admin_auth', '1');
        sessionStorage.setItem('admin_rid',  data.id);
        sessionStorage.setItem('admin_nome', data.nome_restaurante);

        window.location.href = `admin.html?rid=${data.id}`;

      } catch {
        erro.textContent = 'Senha incorreta. Tente novamente.';
        erro.style.display = 'block';
        btn.disabled = false;
        btn.classList.remove('loading');
        senhaInput.value = '';
        senhaInput.focus();
      }
    }

    // Foca a senha ao carregar
    window.addEventListener('load', () => senhaInput.focus());
  </script>
</body>
</html>
